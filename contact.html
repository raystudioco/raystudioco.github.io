layout: page
title: "Contact"
description: "Have questions? I have answers (maybe)."
header-img: "img/siteBg_08_seagul.jpg"

<p>Want to get in touch? Fill out the form below and I will get back to you within 24 hours.</p>

<div id="contactWrapper">

    <form id="contactFormspree" action="https://formspree.io/f/xkoaravj" method="POST" novalidate>
        <div class="row control-group">
            <div class="form-group col-12 floating-label-form-group controls">
                <label for="name">Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Name" required>
            </div>
        </div>
        <div class="row control-group">
            <div class="form-group col-12 floating-label-form-group controls">
                <label for="email">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Email Address" required>
            </div>
        </div>
        <div class="row control-group">
            <div class="form-group col-12 floating-label-form-group controls">
                <label for="phone">Phone Number</label>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="Phone Number (optional)">
            </div>
        </div>
        <div class="row control-group">
            <div class="form-group col-12 floating-label-form-group controls">
                <label for="message">Message</label>
                <textarea rows="5" class="form-control" id="message" name="message" placeholder="Message" required></textarea>
            </div>
        </div>
        <br>
        <div class="row">
            <div class="form-group col-12">
                <button type="submit" id="contactSubmitBtn" class="btn btn-secondary">Send</button>
            </div>
        </div>
    </form>

    <!-- Result overlay — sits on top of the form after submission -->
    <div id="contactOverlay">
        <i id="contactOverlayIcon" class="fa-solid fa-circle-check"></i>
        <h3 id="contactOverlayTitle"></h3>
        <p id="contactOverlayMessage"></p>
        <button id="contactOverlayClose" class="btn btn-secondary">Close</button>
    </div>

</div>

<style>
#contactWrapper {
    position: relative;
}

#contactOverlay {
    position:   absolute;
    top:        0;
    left:       0;
    right:      0;
    bottom:     0;
    background: rgba(255, 255, 255, 0.97);
    z-index:    10;
    display:    flex;
    flex-direction:  column;
    align-items:     center;
    justify-content: center;
    text-align: center;
    padding:    40px 20px;

    /* hidden by default — fade in when .is-visible is added */
    opacity:    0;
    visibility: hidden;
    transition: opacity 0.25s ease;
}

#contactOverlay.is-visible {
    opacity:    1;
    visibility: visible;
}

#contactOverlayIcon {
    font-size:     64px;
    margin-bottom: 18px;
}

#contactOverlayTitle {
    font-family:   'Lora', Times New Roman, serif;
    font-size:     26px;
    font-weight:   700;
    color:         #404040;
    margin-top:    0;
    margin-bottom: 12px;
}

#contactOverlayMessage {
    font-family: 'Open Sans', Helvetica, Arial, sans-serif;
    font-size:   16px;
    color:       #808080;
    margin-bottom: 28px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
    var form         = document.getElementById('contactFormspree');
    var btn          = document.getElementById('contactSubmitBtn');
    var overlay      = document.getElementById('contactOverlay');
    var overlayIcon  = document.getElementById('contactOverlayIcon');
    var overlayTitle = document.getElementById('contactOverlayTitle');
    var overlayMsg   = document.getElementById('contactOverlayMessage');
    var overlayClose = document.getElementById('contactOverlayClose');

    overlayClose.addEventListener('click', function () {
        overlay.classList.remove('is-visible');
    });

    function showOverlay(title, message, isError) {
        overlayTitle.textContent  = title;
        overlayMsg.textContent    = message;
        overlayIcon.className     = isError
            ? 'fa-solid fa-circle-exclamation'
            : 'fa-solid fa-circle-check';
        overlayIcon.style.color   = isError ? '#d9534f' : '#0085A1';
        overlay.classList.add('is-visible');
        document.getElementById('contactWrapper').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    form.addEventListener('submit', function (e) {
        e.preventDefault();

        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        btn.disabled    = true;
        btn.textContent = 'Sending…';

        fetch(form.action, {
            method:  'POST',
            body:    new FormData(form),
            headers: { 'Accept': 'application/json' }
        })
        .then(function (res) {
            return res.json().then(function (data) {
                return { ok: res.ok, data: data };
            });
        })
        .then(function (result) {
            if (result.ok) {
                showOverlay(
                    'Message Sent',
                    "Thank you! Your message has been sent. I'll get back to you within 24 hours.",
                    false
                );
                form.reset();
            } else {
                var errors = (result.data.errors || []).map(function (err) {
                    return err.message;
                });
                showOverlay(
                    'Could not send message',
                    errors.length ? errors.join(' ') : 'Something went wrong. Please try again.',
                    true
                );
            }
        })
        .catch(function () {
            showOverlay(
                'Could not send message',
                'Sorry, there was a problem sending your message. Please try again later.',
                true
            );
        })
        .then(function () {
            btn.disabled    = false;
            btn.textContent = 'Send';
        });
    });
});
</script>
