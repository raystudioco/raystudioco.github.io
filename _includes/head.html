<head>
    <!-- Prevent flash of wrong theme before site.js loads -->
    <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){var h=document.documentElement;h.classList.add('dark-mode');h.setAttribute('data-bs-theme','dark');}}());</script>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">

    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

    <!-- Bootstrap Core CSS -->
    <link rel="stylesheet" href="{{ "/css/bootstrap.min.css" | prepend: site.baseurl }}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ "/css/clean-blog.css" | prepend: site.baseurl }}">
    <link rel="stylesheet" href="{{ "/css/extracustom.css" | prepend: site.baseurl }}">

    <!-- Pygments Github CSS -->
    <link rel="stylesheet" href="{{ "/css/syntax.css" | prepend: site.baseurl }}">

    <!-- Open Graph (#14) -->
    <meta property="og:site_name"   content="{{ site.title }}">
    <meta property="og:title"       content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: page.subtitle | default: site.description }}">
    <meta property="og:url"         content="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <meta property="og:type"        content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:image"       content="{{ site.url }}/{{ page.header-img | default: site.header-img }}">

    <!-- Twitter Card (#15) -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: page.subtitle | default: site.description }}">
    <meta name="twitter:image"       content="{{ site.url }}/{{ page.header-img | default: site.header-img }}">
    {% if site.twitter_username %}<meta name="twitter:site" content="@{{ site.twitter_username }}">{% endif %}

    <!-- JSON-LD Person schema — homepage only (#16) -->
    {% if page.url == "/" %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": {{ site.title | jsonify }},
      "url": "{{ site.url }}",
      "description": {{ site.description | jsonify }},
      "sameAs": [{% if site.twitter_username %}"https://twitter.com/{{ site.twitter_username }}"{% if site.github_username or site.facebook_username %},{% endif %}{% endif %}{% if site.github_username %}"https://github.com/{{ site.github_username }}"{% if site.facebook_username %},{% endif %}{% endif %}{% if site.facebook_username %}"https://www.facebook.com/{{ site.facebook_username }}"{% endif %}]
    }
    </script>
    {% endif %}

    <!-- Custom Fonts -->
    <link rel="stylesheet" href="{{ "/css/font-awesome.min.css" | prepend: site.baseurl }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">

</head>
